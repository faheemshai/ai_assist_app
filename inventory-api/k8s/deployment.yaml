---
# =============================================================================
# Deployment (apps/v1) — replaces deprecated DeploymentConfig for OpenShift 4.14+
#
# Image trigger annotation makes OpenShift automatically update the image
# digest and roll out a new pod whenever oc start-build pushes to the
# ImageStream — same behaviour as DeploymentConfig ImageChange trigger.
#
# TURBONOMIC DEMO SETUP:
#   Intentionally over-provisioned so kubeturbo detects real issues:
#
#   1. CPU request (2000m) ~8x actual usage (~250m)
#      → Turbo generates "Resize Container CPU Down" action
#
#   2. Memory request (4Gi) ~16x actual usage (~256Mi)
#      → Turbo generates "Resize Container Memory Down" action
#
#   3. Limit == Request (zero headroom)
#      → Turbo detects throttling risk, recommends separating limit from request
#
#   4. replicas: 1, no HPA
#      → Turbo may recommend scale-out for availability
#
# Demo flow:
#   • Wait ~15-30 min for kubeturbo to observe utilisation
#   • Turbo UI → Supply Chain → Containers → inventory-api → pending actions
#   • Accept resize action → Turbo patches this Deployment automatically
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: demo-inventory-app
  labels:
    app: inventory-api
    tier: backend
    env: demo
    team: inventory
  annotations:
    # OpenShift image trigger — auto-updates image ref when ImageStream :latest changes
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"inventory-api:latest","namespace":"demo-inventory-app"},"fieldPath":"spec.template.spec.containers[?(@.name==\"inventory-api\")].image","pause":"false"}]
spec:
  # Single replica — Turbo will flag low availability and may recommend scale-out
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        tier: backend
        env: demo
        team: inventory
    spec:
      # Toleration allows the pod to schedule on master/infra nodes which have
      # plenty of free capacity (5000m+ CPU, 19Gi+ memory free each).
      # The 4 worker nodes are ~95-97% CPU utilised and cannot fit this pod.
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      # Prefer the large master/infra nodes explicitly
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
      containers:
        - name: inventory-api
          image: image-registry.openshift-image-registry.svc:5000/demo-inventory-app/inventory-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              # TURBO DEMO: Intentionally over-provisioned vs actual usage
              # (~50m CPU, ~256Mi memory) — ~6x over on CPU, ~8x over on memory.
              # Schedules on master nodes which have 5000m+ CPU free.
              # kubeturbo will observe real utilisation and generate
              # "Resize Container Down" actions for both CPU and memory.
              cpu: "1500m"
              memory: "2Gi"
            limits:
              # Limit == request → zero headroom.
              # Turbo detects throttling risk and recommends separating
              # limit from request to allow burst capacity.
              cpu: "1500m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
---
# =============================================================================
# Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: demo-inventory-app
  labels:
    app: inventory-api
spec:
  selector:
    app: inventory-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
