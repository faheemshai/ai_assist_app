---
# =============================================================================
# Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  labels:
    app: inventory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
        - name: inventory-api
          image: inventory-api:0.0.1-SNAPSHOT
          ports:
            - containerPort: 8080
          # ---------------------------------------------------------------
          # DEMO: Cost-optimisation finding — gross over-provisioning.
          # A lightweight Spring Boot + H2 service consumes ~0.25 CPU and
          # ~256 Mi under normal load.  Requesting 4 CPU / 8 Gi:
          #   • Inflates cloud / infrastructure spend significantly.
          #   • Reduces the number of pods that can be scheduled per node.
          #   • Triggers Kubernetes bin-packing failures on smaller nodes.
          # Recommended fix: right-size to requests≈250m/256Mi,
          # limits≈500m/512Mi, validated with kubectl top / VPA.
          # ---------------------------------------------------------------
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # The API key is hardcoded in application.properties and leaked
          # here as well — echoing it in plain text does not improve the
          # security posture (see application.properties note).
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
---
# =============================================================================
# Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  labels:
    app: inventory-api
spec:
  selector:
    app: inventory-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
