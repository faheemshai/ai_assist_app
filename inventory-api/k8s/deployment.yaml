---
# =============================================================================
# DeploymentConfig — uses OpenShift internal registry via ImageStreamTag trigger.
# Automatically rolls out a new pod whenever oc start-build pushes a new image.
# =============================================================================
apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: inventory-api
  namespace: demo-inventory-app
  labels:
    app: inventory-api
spec:
  replicas: 1
  selector:
    app: inventory-api
  triggers:
    # Re-deploy automatically whenever the ImageStream :latest tag is updated
    - type: ImageChange
      imageChangeParams:
        automatic: true
        containerNames:
          - inventory-api
        from:
          kind: ImageStreamTag
          namespace: demo-inventory-app
          name: inventory-api:latest
    - type: ConfigChange
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
        - name: inventory-api
          # Resolved from the internal registry via the ImageStreamTag trigger above
          image: image-registry.openshift-image-registry.svc:5000/demo-inventory-app/inventory-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
---
# =============================================================================
# Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: demo-inventory-app
  labels:
    app: inventory-api
spec:
  selector:
    app: inventory-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
